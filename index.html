<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>YouTube Multitrack</title>
    <style>
        .players-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .player-container {
            flex: 1 1 320px;
        }

        .track-muted {
            background-color: #ffdddd;
            border: 2px solid #cc0000;
        }

        .mute-active {
            background-color: #cc0000;
            color: white;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h2>YouTube Multitrack</h2>

    <button onclick="playAll()">Play All</button>
    <button onclick="pauseAll()">Pause All</button>

    <h3>Marcadores</h3>

    <button onclick="gotoSection(168)">
        Can you... (3 vozes)
    </button>

    <button onclick="gotoSection(62)">
        What's the difference (2 vozes)
    </button>

    <button onclick="gotoSection(40)">
        I can feel the wheel (uníssono)
    </button>

    <button onclick="gotoSection(116)">
        I can see the end (uníssono)
    </button>

    <hr>

    <div class="players-row">

        <div class="player-container" id="track0">
            <h4>Track 1</h4>
            <div id="player1"></div>
            <button id="muteBtn0" onclick="toggleMute(0)">Mute</button>
        </div>

        <div class="player-container" id="track1">
            <h4>Track 2</h4>
            <div id="player2"></div>
            <button id="muteBtn1" onclick="toggleMute(1)">Mute</button>
        </div>

        <div class="player-container" id="track2">
            <h4>Track 3</h4>
            <div id="player3"></div>
            <button id="muteBtn2" onclick="toggleMute(2)">Mute</button>
        </div>

    </div>

    <script src="https://www.youtube.com/iframe_api"></script>

    <script>

        let players = [];
        let readyCount = 0;

        function onPlayerReady() {
            readyCount++;
            console.log("Player pronto:", readyCount);
        }

        function onYouTubeIframeAPIReady() {

            players[0] = new YT.Player('player1', {
                width: 280,
                height: 157,
                videoId: 'kvJOWG4lXnE',
                events: {
                    onReady: onPlayerReady
                }
            });

            players[1] = new YT.Player('player2', {
                width: 280,
                height: 157,
                videoId: '7BxcXThilr4',
                events: {
                    onReady: onPlayerReady
                }
            });

            players[2] = new YT.Player('player3', {
                width: 280,
                height: 157,
                videoId: 'yl2DCKW00lw',
                events: {
                    onReady: onPlayerReady
                }
            });
        }

        function playAll() {

            if (readyCount < 3) {
                alert("Aguarde os vídeos carregarem.");
                return;
            }

            players.forEach(player => {
                player.playVideo();
            });
        }

        function pauseAll() {
            players.forEach(player => {
                player.pauseVideo();
            });
        }

        function toggleMute(index) {

            const player = players[index];
            const track = document.getElementById(`track${index}`);
            const button = document.getElementById(`muteBtn${index}`);

            if (player.isMuted()) {

                player.unMute();

                track.classList.remove("track-muted");
                button.classList.remove("mute-active");

            } else {

                player.mute();

                track.classList.add("track-muted");
                button.classList.add("mute-active");
            }
        }

        function gotoSection(seconds) {

            players.forEach(player => {
                if (player && player.seekTo) {
                    player.seekTo(seconds, true);
                }
            });

        }

    </script>

</body>

</html>
